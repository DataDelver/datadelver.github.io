repos:
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.21
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-frontmatter>=2.0.8
          - mdformat-mkdocs>=3.0.1

  - repo: local
    hooks:
      - id: convert-images
        name: Convert PNG images to WebP
        entry: python hooks/convert_images.py
        language: python
        types: [image]
        pass_filenames: false
        additional_dependencies:
          - Pillow
